<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Explainer • PHP + JS + Grok</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <style>
        body {
            background: #0d1117;
            color: #c9d1d9;
        }
    
        .code-container pre {
            background: #161b22;
            border-radius: 8px;
        }
    
        .history-item {
            cursor: pointer;
            transition: all 0.2s;
        }
    
        .history-item:hover {
            background: #21262d;
        }
    
        .result-card {
            background: #161b22;
        }
    </style>
</head>
<body class="py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 text-light">Code Explainer</h1>
        </div>

        <div class="row">
            <div class="col-lg-3">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <strong>History (localStorage)</strong>
                        <button onclick="clearHistory()" class="btn btn-sm btn-outline-danger">Clear</button>
                    </div>
                    <div class="card-body p-0">
                        <ul id="history-list" class="list-group list-group-flush"></ul>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="card bg-dark border-secondary mb-4">
                    <div class="card-body">
                        <form id="code-form">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <label class="form-label">Language</label>
                                    <select id="lang" class="form-select" required>
                                        <option value="JavaScript">JavaScript</option>
                                        <option value="Python">Python</option>
                                    </select>
                                </div>
                                <div class="col-md-9">
                                    <label class="form-label">Paste your code snippet</label>
                                    <textarea id="code" class="form-control font-monospace" rows="8" placeholder="function hello() { ... }" required></textarea>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary mt-3 w-100">Explain with Grok →</button>
                        </form>
                    </div>
                </div>

                <div id="result-area" class="d-none">
                    <div class="result-card card border-secondary">
                        <div class="card-header d-flex justify-content-between">
                            <span id="result-lang" class="badge bg-info"></span>
                            <button onclick="copyCode()" class="btn btn-sm btn-outline-secondary">Copy Original</button>
                        </div>
                        <div class="card-body">
                            <h6 class="text-white mb-2">Original Code</h6>
                            <div id="original-code" class="code-container mb-4"></div>

                            <h6 class="text-white mb-2">Plain-English Explanation</h6>
                            <div id="explanation" class="bg-white p-3 rounded border border-secondary" ></div>

                            <h6 class="text-white mt-4 mb-2">Time / Space Complexity</h6>
                            <div id="complexity" class="bg-white p-3 rounded border border-secondary font-monospace"></div>

                            <h6 class="text-white mt-4 mb-2">AI-Suggested Optimized Version</h6>
                            <div id="optimized-code" class="code-container"></div>
                            <div id="optimized-note" class=" small text-warning mt-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
  
</body>
</html>
